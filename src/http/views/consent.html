<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize — AnyList MCP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,.08); padding: 2rem; width: 100%; max-width: 380px; }
    .logo { text-align: center; font-size: 2rem; margin-bottom: .5rem; }
    h1 { font-size: 1.2rem; margin: 0 0 .5rem; color: #111; text-align: center; }
    p { color: #555; font-size: .9rem; text-align: center; margin: 0 0 1.5rem; }
    .scope-box { background: #f8f8f8; border-radius: 6px; padding: .8rem 1rem; margin-bottom: 1.5rem; font-size: .85rem; color: #333; }
    .scope-box strong { display: block; margin-bottom: .4rem; color: #111; }
    .actions { display: flex; gap: .8rem; }
    .btn { flex: 1; padding: .7rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #4f7df3; color: #fff; }
    .btn-primary:hover { background: #3a68e0; }
    .btn-deny { background: #f0f0f0; color: #333; }
    .btn-deny:hover { background: #e4e4e4; }
    .client-id { font-size: .75rem; color: #aaa; text-align: center; margin-top: 1rem; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <h1>Authorize Access</h1>
    <p>A client is requesting access to your AnyList MCP server.</p>

    <div class="scope-box">
      <strong>Requested permissions:</strong>
      Access your AnyList shopping lists, recipes, and meal planner.
    </div>

    <form method="POST" action="/oauth/consent">
      <div class="actions">
        <button type="submit" name="approve" value="yes" class="btn btn-primary">Allow</button>
        <button type="submit" name="approve" value="no" class="btn btn-deny">Deny</button>
      </div>
    </form>

    <p class="client-id">Client ID: {{clientId}}</p>
  </div>
</body>
</html>
