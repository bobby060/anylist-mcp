<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnyList Setup — AnyList MCP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,.08); padding: 2rem; width: 100%; max-width: 420px; }
    h1 { font-size: 1.3rem; margin: 0 0 .5rem; color: #111; }
    p.subtitle { color: #666; font-size: .9rem; margin: 0 0 1.5rem; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; color: #333; }
    input[type=email], input[type=password], input[type=text] { width: 100%; padding: .6rem .8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #4f7df3; box-shadow: 0 0 0 2px rgba(79,125,243,.2); }
    .optional { font-weight: 400; color: #888; font-size: .8rem; }
    .btn { display: block; width: 100%; padding: .7rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #4f7df3; color: #fff; }
    .btn-primary:hover { background: #3a68e0; }
    .error { background: #fff0f0; border: 1px solid #f5c0c0; color: #c00; border-radius: 6px; padding: .6rem .8rem; margin-bottom: 1rem; font-size: .9rem; }
    .success { background: #f0fff4; border: 1px solid #b0e8c0; color: #1a7a35; border-radius: 6px; padding: .6rem .8rem; margin-bottom: 1rem; font-size: .9rem; }
    .note { font-size: .8rem; color: #888; margin-top: -.6rem; margin-bottom: 1rem; }
    .logo { text-align: center; font-size: 2rem; margin-bottom: .5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <h1>Connect AnyList</h1>
    <p class="subtitle">Enter your AnyList credentials. They are encrypted and stored on this server.</p>

    <!-- if:error -->
    <div class="error">{{error}}</div>
    <!-- endif:error -->

    <!-- if:saved -->
    <div class="success">Credentials saved successfully.</div>
    <!-- endif:saved -->

    <form method="POST" action="/setup">
      <label for="anylist-email">AnyList Email</label>
      <input type="email" id="anylist-email" name="anylist_username" required
             value="{{prefillUsername}}" autocomplete="off">

      <label for="anylist-password">AnyList Password</label>
      <input type="password" id="anylist-password" name="anylist_password" required autocomplete="off">

      <label for="default-list">Default List <span class="optional">(optional)</span></label>
      <input type="text" id="default-list" name="default_list"
             value="{{prefillDefaultList}}" placeholder="e.g. Groceries" autocomplete="off">
      <p class="note">If set, shopping tools will use this list when none is specified.</p>

      <button type="submit" class="btn btn-primary">Save &amp; Connect</button>
    </form>
  </div>
</body>
</html>
